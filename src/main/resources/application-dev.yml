# Perfil DEV — persistência local em H2 (sem necessidade de MySQL)
spring:
  datasource:
    url: ${DB_URL:jdbc:h2:file:./data/triaige-srv-orchestrator;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  flyway:
    enabled: false

  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    br.com.triaige: DEBUG
